name: FaceGuard
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    GCC_OPTIMIZATION_LEVEL: "0"

targets:
  FaceGuard:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    sources:
      - path: FaceGuard/App
        group: App
      - path: FaceGuard/Camera
        group: Camera
      - path: FaceGuard/Face
        group: Face
      - path: FaceGuard/Security
        group: Security
      - path: FaceGuard/UI
        group: UI
      - path: FaceGuard/Utilities
        group: Utilities

    settings:
      base:
        PRODUCT_NAME: FaceGuard
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.FaceGuard
        INFOPLIST_FILE: FaceGuard/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: FaceGuard/Resources/FaceGuard.entitlements
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ONLY_ACTIVE_ARCH: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          ONLY_ACTIVE_ARCH: NO

    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework
      - sdk: CoreImage.framework
      - sdk: ServiceManagement.framework
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework

schemes:
  FaceGuard:
    build:
      targets:
        FaceGuard: all
    run:
      config: Debug
    archive:
      config: Release
