name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Generate Icon
        run: |
          chmod +x scratch/make_icon.sh || true
          bash scratch/make_icon.sh || bash .gemini/antigravity/brain/30626109-205a-4347-aa86-407e029b0d0c/scratch/make_icon.sh || true

      - name: Make install script executable
        run: chmod +x install.sh
        
      - name: Build and install
        run: sudo ./install.sh
        
      - name: Create package
        run: |
          mkdir -p staging/Applications
          cp -R /Applications/FaceGuard.app staging/Applications/
          pkgbuild --identifier com.yourname.FaceGuard --version 1.0.0 --install-location / --root staging FaceGuard-1.0.0.pkg
          
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "VERSION=" install.sh | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: FaceGuard-1.0.0.pkg
          name: FaceGuard ${{ steps.get_version.outputs.version }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.get_version.outputs.version) }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
