name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install XcodeGen
        run: |
          brew install xcodegen
          
      - name: Make build script executable
        run: chmod +x build_and_package.sh
        
      - name: Build and package
        run: ./build_and_package.sh
        
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "VERSION=" build_and_package.sh | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ~/Downloads/FaceGuard-${{ steps.get_version.outputs.version }}.pkg
          name: FaceGuard ${{ steps.get_version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
